name: test

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  test-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-rust
        with:
          cache_policy: pull-push
      - name: test
        run: |
          cargo test

  test_github:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    concurrency: test-github
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-rust
        with:
          cache_policy: pull-push
      - name: test github
        env:
          GITHUB_TEST_REPO: ${{ vars.GH_TEST_REPO }}
          GITHUB_TEST_TOKEN: ${{ secrets.GH_TEST_TOKEN }}
          GITHUB_RESET_SHA: ${{ vars.GH_RESET_SHA }}
        run: |
          cargo test --features _integration_tests test_github_forge -- --nocapture

  test_gitlab:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    concurrency: test-gitlab
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-rust
        with:
          cache_policy: pull-push
      - name: test gitlab
        env:
          GITLAB_TEST_REPO: ${{ vars.GL_TEST_REPO }}
          GITLAB_TEST_TOKEN: ${{ secrets.GL_TEST_TOKEN }}
          GITLAB_RESET_SHA: ${{ vars.GL_RESET_SHA }}
        run: |
          cargo test --features _integration_tests test_gitlab_forge -- --nocapture

  test_gitea:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    concurrency: test-gitea
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-rust
        with:
          cache_policy: pull-push
      - name: test gitea
        env:
          GITEA_TEST_REPO: ${{ vars.GT_TEST_REPO }}
          GITEA_TEST_TOKEN: ${{ secrets.GT_TEST_TOKEN }}
          GITEA_RESET_SHA: ${{ vars.GT_RESET_SHA }}
        run: |
          cargo test --features _integration_tests test_gitea_forge -- --nocapture

  test_forgejo:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    concurrency: test-forgejo
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-rust
        with:
          cache_policy: pull-push
      - name: test forgejo
        env:
          FORGEJO_TEST_REPO: ${{ vars.FJ_TEST_REPO }}
          FORGEJO_TEST_TOKEN: ${{ secrets.FJ_TEST_TOKEN }}
          FORGEJO_RESET_SHA: ${{ vars.FJ_RESET_SHA }}
        run: |
          cargo test --features _integration_tests test_forgejo_forge -- --nocapture

  test_azure_devops:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    concurrency: test-azure-devops
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-rust
        with:

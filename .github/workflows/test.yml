          AZURE_DEVOPS_TEST_TOKEN: ${{ secrets.AZDO_TEST_TOKEN }}
          AZURE_DEVOPS_RESET_SHA: ${{ vars.AZDO_RESET_SHA }}
        run: |
          cargo test --features _integration_tests test_azure_devops_forge -- --nocapture
